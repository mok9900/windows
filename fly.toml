app = "dockur-windows"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  VERSION = "11"
  RAM_SIZE = "4G"
  CPU_CORES = "2"
  DISK_SIZE = "64G"

[[mounts]]
  source = "windows_storage"
  destination = "/storage"

[[services]]
  protocol = "tcp"
  internal_port = 8006
  auto_start_machines = false
  auto_stop_machines = false

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[[services]]
  protocol = "tcp"
  internal_port = 3389
  auto_start_machines = false
  auto_stop_machines = false

  [[services.ports]]
    port = 3389

[vm]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 4096
